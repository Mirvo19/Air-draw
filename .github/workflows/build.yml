name: Build EXE

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install opencv-python mediapipe numpy pyinstaller

      - name: Install UPX
        run: |
          choco install upx -y

      - name: Build EXE
        run: |
          pyinstaller --onefile --collect-all mediapipe --exclude-module matplotlib --exclude-module pandas --exclude-module scipy --exclude-module tkinter --exclude-module PIL --exclude-module IPython --exclude-module unittest --upx-dir="C:/ProgramData/chocolatey/bin" air_draw.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/air_draw.exe
